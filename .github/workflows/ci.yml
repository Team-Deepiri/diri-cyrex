name: CI

on:
  push:
    branches: [main, dev, feat/training-orchestrator-ecosystem]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout deepiri-modelkit
        uses: actions/checkout@v4
        with:
          repository: Team-Deepiri/deepiri-modelkit
          path: deepiri-modelkit
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3

      - name: Point modelkit path dep at checkout
        run: |
          sed -i 's|path = "../deepiri-modelkit"|path = "./deepiri-modelkit"|' pyproject.toml

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Lint
        run: poetry run ruff check app/training app/routes/training_api.py tests/training

      - name: Test
        run: poetry run pytest tests/training -q
